<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocaFly</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }

    h1 {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: #555568;
      text-transform: uppercase;
    }

    .card {
      position: relative;
      width: min(480px, 90vw);
      min-height: 260px;
      background: #1a1a24;
      border-radius: 28px;
      border: 1px solid #2a2a38;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 36px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .card:hover { border-color: #3d3d55; box-shadow: 0 12px 50px rgba(0,0,0,0.6); }
    .card:active { transform: scale(0.99); }

    .word {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      color: #f0f0ff;
      line-height: 1.2;
    }

    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #44445a;
      letter-spacing: 0.06em;
    }

    .definition {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #2a2a38;
      font-size: 15px;
      line-height: 1.65;
      color: #a0a0c0;
      text-align: center;
      width: 100%;
    }

    .card.revealed .hint { display: none; }
    .card.revealed .definition { display: block; }

    .def-main { color: #a0a0c0; font-size: 15px; line-height: 1.65; }
    .sub-entry {
      margin-top: 10px; font-size: 13px; color: #6868a0; line-height: 1.55;
      padding-left: 12px; border-left: 2px solid #2a2a48;
    }
    .definition a { color: #8878f0; text-decoration: none; }
    .definition a:hover { text-decoration: underline; }

    .controls {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      color: #8888aa;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    button:hover { border-color: #4a4a6a; color: #c0c0e0; background: #22222e; }
    button:active { transform: scale(0.97); }

    button.primary {
      background: #6c5ce7;
      border-color: #6c5ce7;
      color: #fff;
    }
    button.primary:hover { background: #7d6ef0; border-color: #7d6ef0; }

    .counter {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #33334a;
      letter-spacing: 0.08em;
    }

    .settings-btn {
      position: fixed;
      top: 24px;
      right: 28px;
      background: none;
      border: none;
      color: #44445a;
      font-size: 18px;
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
      line-height: 1;
    }
    .settings-btn:hover { color: #7070a0; background: #1a1a24; }
    .add-btn { right: 66px; }

    .panel {
      display: none;
      position: fixed;
      top: 60px;
      right: 28px;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 20px 24px;
      width: 230px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      z-index: 21;
    }
    .panel.open { display: block; }

    .panel label {
      display: block;
      font-size: 12px;
      color: #666680;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .panel select {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a38;
      color: #a0a0c0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      cursor: pointer;
    }

    .panel input[type="text"], .panel textarea {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a38;
      color: #e8e8f0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      font-family: inherit;
      resize: vertical;
    }

    .notif-status {
      font-size: 11px;
      color: #44445a;
      margin-top: 4px;
    }
    .notif-status.ok { color: #55aa77; }
    .notif-status.blocked { color: #aa5555; }

    .search-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 19;
    }
    .search-backdrop.on { display: block; }

    .search-wrap {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: min(360px, 85vw);
      z-index: 20;
    }

    .search-input {
      width: 100%;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      color: #e8e8f0;
      padding: 9px 16px;
      border-radius: 50px;
      font-size: 16px; /* prevent iOS auto-zoom */
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .search-input::placeholder { color: #44445a; }
    .search-input:focus { border-color: #4a4a6a; }

    .suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      max-height: 260px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .suggestions.open { display: block; }

    .sug-item {
      padding: 12px 16px;
      font-size: 15px;
      color: #a0a0c0;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom: 1px solid #1f1f2e;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover, .sug-item:active { background: #22222e; color: #e8e8f0; }
    .sug-item mark { background: none; color: #8878f0; font-weight: 600; }
  </style>
</head>
<body>

<h1>VocaFly</h1>

<div class="search-backdrop" id="searchBackdrop"></div>
<div class="search-wrap">
  <input class="search-input" id="searchInput" type="text" placeholder="Search words…" autocomplete="off">
  <div class="suggestions" id="suggestions"></div>
</div>

<button class="settings-btn add-btn" id="addBtn" title="Add word">+</button>
<button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>

<div class="panel" id="addPanel">
  <label>Word</label>
  <div style="position:relative">
    <input type="text" id="newWord" placeholder="e.g. demolish (v)" autocomplete="off">
    <div class="suggestions" id="newWordSuggestions"></div>
  </div>
  <label>Definition</label>
  <textarea id="newDefinition" rows="4" placeholder="Definition text…"></textarea>
  <button id="submitWordBtn" class="primary" style="width:100%">Add word</button>
  <div class="notif-status" id="addStatus"></div>
</div>

<div class="panel" id="panel">
  <label>Notification interval</label>
  <select id="intervalSelect">
    <option value="0">Off</option>
    <option value="10">Every 10 min</option>
    <option value="20">Every 20 min</option>
    <option value="30" selected>Every 30 min</option>
    <option value="60">Every hour</option>
  </select>
  <div class="notif-status" id="notifStatus">–</div>
  <button id="testNotifBtn" style="margin-top:10px;width:100%;font-size:12px;padding:7px">Send test notification</button>
</div>

<div class="card" id="card">
  <div class="word" id="word">–</div>
  <div class="hint">tap to reveal</div>
  <div class="definition" id="definition"></div>
</div>

<div class="controls">
  <button id="nextBtn" class="primary">Next word →</button>
</div>

<div class="counter" id="counter"></div>

<script>
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let words = [], current = 0, seen = new Set(), notifTimer = null;

async function loadWords() {
  const res = await fetch('words.json');
  words = await res.json();
  shuffle();
  showWord();
}

function shuffle() {
  for (let i = words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [words[i], words[j]] = [words[j], words[i]];
  }
  current = 0;
  seen.clear();
}

function renderMd(text) {
  return text.split(/(\[[^\]]+\]\([^)]+\))/g).map(p => {
    const m = p.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
    return m ? `<a href="${m[2]}" target="_blank" rel="noopener">${esc(m[1])}</a>` : esc(p);
  }).join('');
}

function renderDef(raw) {
  return (raw || '').split('\n\n').map(para => {
    para = para.trim();
    if (!para) return '';
    if (para.startsWith('→')) {
      return `<div class="sub-entry">${renderMd(para.slice(1).trim())}</div>`;
    }
    return `<div class="def-main">${renderMd(para)}</div>`;
  }).join('');
}

function showWord(entry) {
  if (!entry) {
    if (current >= words.length) shuffle();
    entry = words[current];
  }
  document.getElementById('word').textContent = entry.word;
  document.getElementById('definition').innerHTML = renderDef(entry.definition);
  document.getElementById('card').classList.remove('revealed');
  document.getElementById('counter').textContent = `${seen.size} / ${words.length} seen`;
}

document.getElementById('card').addEventListener('click', () => {
  const card = document.getElementById('card');
  if (!card.classList.contains('revealed')) {
    card.classList.add('revealed');
    seen.add(current);
  }
});

document.getElementById('nextBtn').addEventListener('click', e => {
  e.stopPropagation();
  seen.add(current);
  current++;
  showWord();
});

// Settings panel
document.getElementById('settingsBtn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('addPanel').classList.remove('open');
  document.getElementById('panel').classList.toggle('open');
});
document.addEventListener('click', () => {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('addPanel').classList.remove('open');
  document.getElementById('newWordSuggestions').classList.remove('open');
});
document.getElementById('panel').addEventListener('click', e => e.stopPropagation());

// Add word panel
document.getElementById('addBtn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('panel').classList.remove('open');
  const wasOpen = document.getElementById('addPanel').classList.contains('open');
  document.getElementById('addPanel').classList.toggle('open');
  if (wasOpen) return;
  document.getElementById('newWord').value = '';
  document.getElementById('newDefinition').value = '';
  document.getElementById('addStatus').textContent = '';
  setEditMode(null);
});
document.getElementById('addPanel').addEventListener('click', e => e.stopPropagation());

// Word autocomplete (mirrors search); picking a match loads it for editing
const newWordInput = document.getElementById('newWord');
const newDefinitionInput = document.getElementById('newDefinition');
const submitWordBtn = document.getElementById('submitWordBtn');
const newWordSuggestions = document.getElementById('newWordSuggestions');
let newWordMatches = [];
let editingOriginalWord = null;

function setEditMode(original) {
  editingOriginalWord = original;
  submitWordBtn.textContent = original ? 'Update word' : 'Add word';
}

newWordInput.addEventListener('input', () => {
  setEditMode(null);
  const q = newWordInput.value.trim().toLowerCase();
  if (!q || !words.length) { newWordSuggestions.classList.remove('open'); return; }
  newWordMatches = words.filter(w => w.word.toLowerCase().includes(q)).slice(0, 8);
  if (!newWordMatches.length) { newWordSuggestions.classList.remove('open'); return; }
  newWordSuggestions.innerHTML = newWordMatches.map((w, i) => {
    const lower = w.word.toLowerCase();
    const qi = lower.indexOf(q);
    const hl = esc(w.word.slice(0, qi)) +
               `<mark>${esc(w.word.slice(qi, qi + q.length))}</mark>` +
               esc(w.word.slice(qi + q.length));
    return `<div class="sug-item" data-i="${i}">${hl}</div>`;
  }).join('');
  newWordSuggestions.classList.add('open');
});

newWordSuggestions.addEventListener('click', e => {
  const item = e.target.closest('.sug-item');
  if (!item) return;
  const entry = newWordMatches[+item.dataset.i];
  newWordInput.value = entry.word;
  newDefinitionInput.value = entry.definition;
  setEditMode(entry.word);
  newWordSuggestions.classList.remove('open');
  const statusEl = document.getElementById('addStatus');
  statusEl.textContent = 'Editing existing word';
  statusEl.className = 'notif-status';
});

document.getElementById('submitWordBtn').addEventListener('click', async e => {
  e.stopPropagation();
  const wordEl = document.getElementById('newWord');
  const defEl = document.getElementById('newDefinition');
  const statusEl = document.getElementById('addStatus');
  const word = wordEl.value.trim();
  const definition = defEl.value.trim();
  if (!word || !definition) {
    statusEl.textContent = 'Both fields required';
    statusEl.className = 'notif-status blocked';
    return;
  }
  if (!editingOriginalWord && words.some(w => w.word.toLowerCase() === word.toLowerCase())) {
    statusEl.textContent = 'Word already exists';
    statusEl.className = 'notif-status blocked';
    return;
  }
  newWordSuggestions.classList.remove('open');
  statusEl.textContent = 'Saving…';
  statusEl.className = 'notif-status';
  try {
    const res = await fetch('api/words', {
      method: editingOriginalWord ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(editingOriginalWord ? { original: editingOriginalWord, word, definition } : { word, definition })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Save failed');
    if (editingOriginalWord) {
      const idx = words.findIndex(w => w.word.toLowerCase() === editingOriginalWord.toLowerCase());
      if (idx >= 0) words[idx] = data;
      statusEl.textContent = 'Updated';
    } else {
      words.push(data);
      statusEl.textContent = 'Added';
    }
    wordEl.value = '';
    defEl.value = '';
    setEditMode(null);
    statusEl.className = 'notif-status ok';
    document.getElementById('counter').textContent = `${seen.size} / ${words.length} seen`;
  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.className = 'notif-status blocked';
  }
});

// Web Notifications
async function ensurePermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  return (await Notification.requestPermission()) === 'granted';
}

function fireNotification() {
  if (!words.length) return;
  const entry = words[Math.floor(Math.random() * words.length)];
  const baseWord = entry.word.split(/\s+[(/]/)[0].trim();
  const n = new Notification(baseWord, { icon: 'icon.png', silent: false });
  n.onclick = () => {
    window.focus();
    const i = words.findIndex(w => w.word === entry.word);
    if (i >= 0) current = i;
    showWord(entry);
    n.close();
  };
}

function startNotifTimer(minutes) {
  if (notifTimer) clearInterval(notifTimer);
  if (minutes > 0) notifTimer = setInterval(fireNotification, minutes * 60 * 1000);
}

async function updateNotifStatus(on) {
  const el = document.getElementById('notifStatus');
  if (!('Notification' in window)) {
    el.textContent = 'Notifications not supported';
    el.className = 'notif-status blocked';
    return;
  }
  if (on && Notification.permission === 'denied') {
    el.textContent = 'Blocked — allow in browser settings';
    el.className = 'notif-status blocked';
    return;
  }
  el.textContent = on ? 'Notifications on' : 'Off';
  el.className = 'notif-status' + (on ? ' ok' : '');
}

document.getElementById('intervalSelect').addEventListener('change', async function() {
  const mins = parseInt(this.value);
  if (mins > 0) {
    const ok = await ensurePermission();
    if (!ok) {
      this.value = '0';
      updateNotifStatus(false);
      return;
    }
    fireNotification();
  }
  startNotifTimer(mins);
  updateNotifStatus(mins > 0);
  localStorage.setItem('notifInterval', this.value);
});

document.getElementById('testNotifBtn').addEventListener('click', async () => {
  const ok = await ensurePermission();
  if (ok) fireNotification();
  else updateNotifStatus(true);
});

// Restore saved interval
const saved = localStorage.getItem('notifInterval');
if (saved) {
  document.getElementById('intervalSelect').value = saved;
  const mins = parseInt(saved);
  if (mins > 0 && Notification.permission === 'granted') {
    startNotifTimer(mins);
    updateNotifStatus(true);
  } else {
    updateNotifStatus(false);
  }
} else {
  updateNotifStatus(false);
}

// Search
const searchInput = document.getElementById('searchInput');
const suggestionsEl = document.getElementById('suggestions');
const searchBackdrop = document.getElementById('searchBackdrop');
let sugMatches = [];

function closeSearch() {
  suggestionsEl.classList.remove('open');
  searchBackdrop.classList.remove('on');
  searchInput.blur();
}

function clampSugHeight() {
  const vp = window.visualViewport;
  if (!vp) return;
  const rect = suggestionsEl.getBoundingClientRect();
  const available = vp.height - rect.top - 8;
  suggestionsEl.style.maxHeight = Math.max(80, available) + 'px';
}

searchInput.addEventListener('focus', () => searchBackdrop.classList.add('on'));

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q || !words.length) { suggestionsEl.classList.remove('open'); return; }
  sugMatches = words.filter(w => w.word.toLowerCase().includes(q)).slice(0, 8);
  if (!sugMatches.length) { suggestionsEl.classList.remove('open'); return; }
  suggestionsEl.innerHTML = sugMatches.map((w, i) => {
    const lower = w.word.toLowerCase();
    const qi = lower.indexOf(q);
    const hl = esc(w.word.slice(0, qi)) +
               `<mark>${esc(w.word.slice(qi, qi + q.length))}</mark>` +
               esc(w.word.slice(qi + q.length));
    return `<div class="sug-item" data-i="${i}">${hl}</div>`;
  }).join('');
  suggestionsEl.classList.add('open');
  clampSugHeight();
});

suggestionsEl.addEventListener('click', e => {
  const item = e.target.closest('.sug-item');
  if (!item) return;
  const entry = sugMatches[+item.dataset.i];
  searchInput.value = '';
  closeSearch();
  current = words.indexOf(entry);
  showWord(entry);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearch();
});

searchBackdrop.addEventListener('click', () => {
  searchInput.value = '';
  closeSearch();
});

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (suggestionsEl.classList.contains('open')) clampSugHeight();
  });
}

loadWords();
</script>
</body>
</html>
